name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ══════════════════════════════════════════════════════════════════════
  # Job 1: Lint (fastest — fails first if code style wrong)
  # ══════════════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linters
        run: |
          pip install ruff black mypy

      - name: Ruff check
        run: ruff check backend/ tests/

      - name: Ruff format check
        run: ruff format --check backend/ tests/

      - name: Mypy type check
        run: mypy backend/
        continue-on-error: true   # advisory during rollout

  # ══════════════════════════════════════════════════════════════════════
  # Job 2: Tests (matrix — multiple Python versions)
  # ══════════════════════════════════════════════════════════════════════
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -m unit -v --tb=short

      - name: Run integration tests
        run: pytest tests/ -m integration -v --tb=short

      - name: Run E2E tests
        run: pytest tests/ -m e2e -v --tb=short

  # ══════════════════════════════════════════════════════════════════════
  # Job 3: Coverage (must be > 80%)
  # ══════════════════════════════════════════════════════════════════════
  coverage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Enforce coverage threshold
        run: pytest --cov=backend --cov-fail-under=70

      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ══════════════════════════════════════════════════════════════════════
  # Job 4: Benchmarks (informational, doesn't fail)
  # ══════════════════════════════════════════════════════════════════════
  benchmark:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run benchmarks
        run: pytest tests/test_benchmarks.py --benchmark-only --benchmark-json=benchmark.json
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json
